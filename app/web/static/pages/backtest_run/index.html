<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Backtest - PySide6 Freqtrade</title>
  <link rel="stylesheet" href="/static/shared/styles/variables.css">
  <link rel="stylesheet" href="/static/shared/styles/base.css">
  <link rel="stylesheet" href="/static/shared/styles/themes.css">
  <link rel="stylesheet" href="/static/pages/backtest_run/styles.css">
</head>
<body>
  <div class="page-container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>PySide6 Freqtrade</h1>
      </div>
      <div class="navbar-links">
        <a href="/static/pages/dashboard/index.html">Dashboard</a>
        <a href="/static/pages/backtest_run/index.html" class="active">Run Backtest</a>
        <a href="/static/pages/optimizer/index.html">Optimizer</a>
        <a href="/static/pages/run_detail/index.html">Run Detail</a>
        <a href="/static/pages/comparison/index.html">Comparison</a>
        <a href="/static/pages/settings/index.html">Settings</a>
      </div>
      <div class="navbar-actions">
        <button id="theme-toggle" class="button button-secondary">Toggle Theme</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <div class="page-header">
          <h2>Run Backtest</h2>
          <div class="header-actions">
            <span id="status-indicator" class="status-badge status-ready">Ready</span>
            <button type="button" id="load-prefs-btn" class="button button-secondary">Load Saved Prefs</button>
          </div>
        </div>
        
        <div class="card form-container">
          <form id="backtest-form">
            <!-- Strategy -->
            <div class="form-group">
              <label for="strategy">Strategy</label>
              <select id="strategy" name="strategy" class="input">
                <option value="">Loading strategies...</option>
              </select>
            </div>

            <!-- Timeframe -->
            <div class="form-group">
              <label for="timeframe">Timeframe</label>
              <select id="timeframe" name="timeframe" class="input">
                <option value="5m">5m</option>
                <option value="15m">15m</option>
                <option value="1h">1h</option>
                <option value="4h">4h</option>
                <option value="1d">1d</option>
              </select>
            </div>

            <!-- Timerange Preset -->
            <div class="form-group">
              <label for="timerange-preset">Timerange Preset</label>
              <select id="timerange-preset" name="timerange-preset" class="input">
                <option value="custom">Custom</option>
                <option value="7d">7 days</option>
                <option value="14d">14 days</option>
                <option value="30d" selected>30 days</option>
                <option value="90d">90 days</option>
                <option value="180d">180 days</option>
                <option value="360d">360 days</option>
              </select>
            </div>

            <!-- Timerange -->
            <div class="form-group">
              <label for="timerange">Timerange (e.g., 20240101-20241231)</label>
              <input type="text" id="timerange" name="timerange" class="input" placeholder="20240101-20241231">
            </div>

            <!-- Pairs Selection -->
            <div class="form-group">
              <label>Trading Pairs</label>
              <div class="pairs-header">
                <button type="button" id="randomize-pairs" class="button button-secondary">Randomize Pairs</button>
                <span class="pairs-count">Selected: 0</span>
              </div>
              <div class="pairs-search">
                <input type="text" id="pairs-search" class="input" placeholder="Search pairs...">
              </div>
              <div class="card pairs-container" id="pairs-container">
                <div class="loading">Loading pairs...</div>
              </div>
            </div>

            <!-- Max Open Trades -->
            <div class="form-group">
              <label for="max_open_trades">Max Open Trades</label>
              <input type="number" id="max_open_trades" name="max_open_trades" class="input" value="3" min="1" max="20">
            </div>

            <!-- Dry Run Wallet -->
            <div class="form-group">
              <label for="dry_run_wallet">Dry Run Wallet (USDT)</label>
              <input type="number" id="dry_run_wallet" name="dry_run_wallet" class="input" value="1000" min="100" step="100">
            </div>

            <!-- Action Buttons -->
            <div class="form-actions">
              <button type="button" id="download-data-btn" class="button button-secondary">Download Data</button>
              <button type="button" id="run-backtest-btn" class="button button-primary">Run Backtest</button>
              <button type="button" id="stop-backtest-btn" class="button button-danger" disabled>Stop</button>
            </div>
          </form>
        </div>

        <!-- Live Logs Panel -->
        <div class="card logs-panel">
          <div class="logs-header">
            <h3>Live Logs</h3>
            <button id="clear-logs" class="button button-secondary">Clear</button>
          </div>
          <div class="logs-container" id="logs-container">
            <div class="log-entry">Waiting for task to start...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/static/pages/backtest_run/script.js"></script>
</body>
</html>
