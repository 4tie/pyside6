<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - PySide6 Freqtrade</title>
  <link rel="stylesheet" href="/static/shared/styles/variables.css">
  <link rel="stylesheet" href="/static/shared/styles/base.css">
  <link rel="stylesheet" href="/static/shared/styles/themes.css">
  <link rel="stylesheet" href="/static/pages/dashboard/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // Initialize theme synchronously to prevent flash of unstyled content
    (function() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = saved;
    })();
  </script>
</head>
<body>
  <div class="page-container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>PySide6 Freqtrade</h1>
      </div>
      <div class="navbar-links">
        <a href="/static/pages/dashboard/index.html" class="active">Dashboard</a>
        <a href="/static/pages/backtest_run/index.html">Run Backtest</a>
        <a href="/static/pages/optimizer/index.html">Optimizer</a>
        <a href="/static/pages/run_detail/index.html">Run Detail</a>
        <a href="/static/pages/comparison/index.html">Comparison</a>
        <a href="/static/pages/settings/index.html">Settings</a>
      </div>
      <div class="navbar-actions">
        <button id="theme-toggle" class="button button-secondary">Toggle Theme</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <div class="page-header">
          <h2>Dashboard</h2>
          <button id="refresh-btn" class="button button-secondary">Refresh</button>
        </div>
        
        <!-- Metrics Cards -->
        <div class="metrics-grid">
          <div class="metric-card">
            <span class="metric-label">Total Runs</span>
            <span class="metric-value" id="total-runs">0</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Strategies</span>
            <span class="metric-value" id="total-strategies">0</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Best Profit</span>
            <span class="metric-value" id="best-profit">0%</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Best Win Rate</span>
            <span class="metric-value" id="best-winrate">0%</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Min Drawdown</span>
            <span class="metric-value" id="min-drawdown">0%</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Latest Run</span>
            <span class="metric-value" id="latest-run">-</span>
          </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-section">
          <div class="chart-card">
            <h4>Equity Curve (Latest Run)</h4>
            <div class="chart-container">
              <canvas id="equity-chart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h4>Per-Trade Profit (Latest Run)</h4>
            <div class="chart-container">
              <canvas id="profit-chart"></canvas>
            </div>
          </div>
        </div>

        <!-- Recent Runs -->
        <div class="section-header">
          <h3>Recent Runs</h3>
          <a href="/static/pages/run_detail/index.html" class="button button-small">View All</a>
        </div>
        <div class="runs-list" id="runs-list">
          <div class="loading">Loading runs...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/static/pages/dashboard/script.js"></script>
</body>
</html>
