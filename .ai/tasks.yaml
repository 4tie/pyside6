requests:
  - requestId: req-1
    originalRequest: Add a new tab for editing strategy parameters config (config.json) from within the application
    splitDetails: Add a new tab for editing strategy parameters config (config.json) from within the application
    tasks:
      - id: task-1
        title: StrategyConfigService — read/write strategy JSON files
        description: |-
          Create `app/core/services/strategy_config_service.py` with a stateless `StrategyConfigService` class.

          The strategy JSON format is:
          ```json
          {
            "strategy_name": "MultiMeee",
            "params": {
              "buy":     { "buy_ma_count": 6, "buy_ma_gap": 14 },
              "sell":    { "sell_ma_count": 14, "sell_ma_gap": 66 },
              "roi":     { "0": 0.523, "1553": 0.123, "3169": 0 },
              "stoploss":         { "stoploss": -0.345 },
              "max_open_trades":  { "max_open_trades": 3 },
              "trailing": {
                "trailing_stop": false,
                "trailing_stop_positive": null,
                "trailing_stop_positive_offset": 0.0,
                "trailing_only_offset_is_reached": false
              }
            }
          }
          ```

          Responsibilities:
          - `get_strategy_json_files(strategies_dir: str) -> List[Path]` — return sorted list of `.json` files in `user_data/strategies/` that have a matching `.py` file (i.e. only strategy JSONs, not arbitrary files)
          - `load(json_path: Path) -> dict` — read and parse the file; raise `FileNotFoundError` / `ValueError` on failure
          - `save(json_path: Path, data: dict)` — atomic write via temp file + rename; `json.dumps(indent=2)`
          - `get_known_sections(params: dict) -> tuple[dict, dict]` — split `params` into `(known, unknown)` where known = `roi`, `stoploss`, `trailing`, `max_open_trades`, `buy`, `sell`; unknown = everything else (preserved on save)

          All methods `@staticmethod`. Logger: `_log = get_logger("strategy_config")`.
        done: true
        completedDetails: 'Created app/core/services/strategy_config_service.py with: get_strategy_json_files(), load(), save() (atomic via os.replace), get_known_sections(). All @staticmethod, _log = get_logger("strategy_config").'
        subtasks: []
      - id: task-2
        title: StrategyConfigPage — UI page
        description: |-
          Create `app/ui/pages/strategy_config_page.py` with `StrategyConfigPage(QWidget)`.

          The page edits `user_data/strategies/<StrategyName>.json` files with this structure:
          ```json
          {
            "strategy_name": "MultiMeee",
            "params": {
              "buy":   { "buy_ma_count": 6, "buy_ma_gap": 14 },
              "sell":  { "sell_ma_count": 14, "sell_ma_gap": 66 },
              "roi":   { "0": 0.523, "1553": 0.123, "3169": 0 },
              "stoploss":        { "stoploss": -0.345 },
              "max_open_trades": { "max_open_trades": 3 },
              "trailing": {
                "trailing_stop": false,
                "trailing_stop_positive": null,
                "trailing_stop_positive_offset": 0.0,
                "trailing_only_offset_is_reached": false
              }
            }
          }
          ```

          **Top toolbar:**
          - `QComboBox` (strategy selector) — populated from `StrategyConfigService.get_strategy_json_files()`; shows strategy names (stem of filename)
          - `QPushButton("Reload")` — reload selected file from disk
          - `QPushButton("Save")` — save to disk
          - `QLabel` (status: "Saved ✓" green / error red)

          **Main layout (left | right, ratio 1:1):**

          Left panel:
          - `QGroupBox("Parameters")` with `QFormLayout`:
            - `stoploss` → `QDoubleSpinBox` (-1.0 to 0.0, step 0.001, 3 decimals; stored under `params.stoploss.stoploss`)
            - `max_open_trades` → `QSpinBox` (-1 to 999; stored under `params.max_open_trades.max_open_trades`; note: not all JSONs have this key — default to -1 if absent)
          - `QGroupBox("Trailing Stop")` with `QFormLayout`:
            - `trailing_stop` → `QCheckBox` (`params.trailing.trailing_stop`)
            - `trailing_stop_positive` → `QDoubleSpinBox` (0–1, step 0.001; null stored as 0.0)
            - `trailing_stop_positive_offset` → `QDoubleSpinBox` (0–1, step 0.001)
            - `trailing_only_offset_is_reached` → `QCheckBox`
          - `QGroupBox("Buy Params")` with dynamic `QFormLayout` — one `QDoubleSpinBox` / `QSpinBox` per key in `params.buy` (auto-detect int vs float)
          - `QGroupBox("Sell Params")` with dynamic `QFormLayout` — same pattern for `params.sell`

          Right panel:
          - `QGroupBox("ROI Table")`:
            - `QTableWidget` 2 columns: "Minutes" (int) | "ROI %" (float × 100 for display, ÷ 100 on save)
            - `QPushButton("Add Row")` / `QPushButton("Remove Row")` below table
            - Rows sorted ascending by minutes on load

          **Bottom bar:**
          - `QLabel` showing full resolved file path (grey, 9pt)

          **Behaviour:**
          - On init: populate combo from `StrategyConfigService.get_strategy_json_files()`; load first file if available
          - `settings_state.settings_changed` → refresh combo + reload
          - Selecting a different strategy in combo → auto-load that file
          - `_load()`: read file → populate all widgets; unknown `params` keys preserved on save (round-trip safe)
          - `_save()`: collect all widgets → update only known sections in the loaded dict → write back
          - `_log = get_logger("strategy_config_page")`
        done: true
        completedDetails: 'Created app/ui/pages/strategy_config_page.py with: strategy QComboBox selector, Parameters group (stoploss + max_open_trades), Trailing Stop group, dynamic Buy/Sell Params groups (auto int/float detection), ROI QTableWidget with Add/Remove, bottom path label, _load()/_save() with round-trip safety for unknown params keys.'
        subtasks: []
      - id: task-3
        title: Wire StrategyConfigPage into MainWindow
        description: |-
          In `app/ui/main_window.py`:
          - Import `StrategyConfigPage` from `app.ui.pages.strategy_config_page`
          - Instantiate `self.strategy_config_page = StrategyConfigPage(self.settings_state)`
          - Add tab: `self.tabs.addTab(self.strategy_config_page, "Strategy Config")`
          - Insert the tab between "Download Data" and "Terminal" tabs
        done: true
        completedDetails: Added StrategyConfigPage import and tab insertion in main_window.py between Download Data and Terminal tabs.
        subtasks: []
    completed: false
    notes:
      - id: note-1
        title: config.json location
        content: Target file is `user_data/config.json`. Path resolved via `StrategyConfigService.get_config_path(settings.user_data_path)`.
        createdAt: '2026-04-16T06:19:47.455Z'
        updatedAt: '2026-04-16T06:19:47.455Z'
      - id: note-2
        title: Round-trip safety
        content: Load the full config dict, update only the editable keys, save the full dict back. Never discard unknown keys.
        createdAt: '2026-04-16T06:19:47.455Z'
        updatedAt: '2026-04-16T06:19:47.455Z'
      - id: note-3
        title: minimal_roi storage format
        content: 'Freqtrade stores minimal_roi as `{"0": 0.10, "30": 0.05, "60": 0.02}` — keys are minute strings, values are ratios. UI displays as % (multiply by 100 for display, divide by 100 on save).'
        createdAt: '2026-04-16T06:19:47.455Z'
        updatedAt: '2026-04-16T06:19:47.455Z'
      - id: note-4
        title: stoploss sign convention
        content: Freqtrade stores stoploss as a negative float (e.g. -0.10 = 10% stop). The spinbox range is -1.0 to 0.0.
        createdAt: '2026-04-16T06:19:47.455Z'
        updatedAt: '2026-04-16T06:19:47.455Z'
