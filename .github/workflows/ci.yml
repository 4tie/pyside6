name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Format
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff lint
        run: ruff check app/ data/tools/

      - name: ruff format check
        run: ruff format --check app/ data/tools/

  # ─────────────────────────────────────────────
  # 2. Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pydantic>=2.0.0 pytest
          # PySide6 not installed in CI — UI tests are skipped
          # pip install PySide6  ← too heavy for CI

      - name: Run core tests (no UI)
        run: pytest tests/core/ --tb=short -q

  # ─────────────────────────────────────────────
  # 3. Structure Validation
  # ─────────────────────────────────────────────
  structure:
    name: Structure Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify required docs exist
        run: python data/tools/ci_checks/check_docs.py

      - name: Verify no UI imports in services
        run: python data/tools/ci_checks/check_layer_violations.py

      - name: Verify no hardcoded paths
        run: python data/tools/ci_checks/check_hardcoded_paths.py

      - name: Verify strategy JSON format
        run: python data/tools/ci_checks/check_strategy_json.py
