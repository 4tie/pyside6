<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparison - PySide6 Freqtrade</title>
  <link rel="stylesheet" href="/static/shared/styles/variables.css">
  <link rel="stylesheet" href="/static/shared/styles/base.css">
  <link rel="stylesheet" href="/static/shared/styles/themes.css">
  <link rel="stylesheet" href="/static/pages/comparison/styles.css">
  <script>
    // Initialize theme synchronously to prevent flash of unstyled content
    (function() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = saved;
    })();
  </script>
</head>
<body>
  <div class="page-container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>PySide6 Freqtrade</h1>
      </div>
      <div class="navbar-links">
        <a href="/static/pages/dashboard/index.html">Dashboard</a>
        <a href="/static/pages/backtest_run/index.html">Run Backtest</a>
        <a href="/static/pages/optimizer/index.html">Optimizer</a>
        <a href="/static/pages/run_detail/index.html">Run Detail</a>
        <a href="/static/pages/comparison/index.html" class="active">Comparison</a>
        <a href="/static/pages/settings/index.html">Settings</a>
      </div>
      <div class="navbar-actions">
        <button id="theme-toggle" class="button button-secondary">Toggle Theme</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <div class="page-header">
          <h2>Compare Runs</h2>
        </div>
        
        <!-- Run Selection -->
        <div class="card">
          <h3>Select Runs to Compare</h3>
          <div class="run-selection">
            <div class="select-group">
              <label for="run-a">Run A (Baseline)</label>
              <select id="run-a" class="input">
                <option value="">Select run...</option>
              </select>
            </div>
            <div class="select-group">
              <label for="run-b">Run B (Candidate)</label>
              <select id="run-b" class="input">
                <option value="">Select run...</option>
              </select>
            </div>
            <button id="compare-btn" class="button">Compare</button>
          </div>
        </div>

        <!-- Comparison Results -->
        <div id="comparison-results" class="hidden">
          <div class="card">
            <h3>Comparison Results</h3>
            <div class="verdict" id="verdict"></div>
            
            <div class="comparison-table">
              <table>
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>Run A</th>
                    <th>Run B</th>
                    <th>Difference</th>
                  </tr>
                </thead>
                <tbody id="comparison-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/static/pages/comparison/script.js"></script>
</body>
</html>
